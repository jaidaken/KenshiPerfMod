name: Build KenshiPerfMod

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- Windows 7.1 SDK / VC++ 2010 toolset ---

      - name: Cache W7SDK
        uses: actions/cache@v4
        id: cache-w7sdk
        with:
          path: W7SDK-v1.zip
          key: w7sdk-v1-sha256-8d90703130c4bc735fa215ee14cddf868e27c156b72065c434ec747d5f120d44

      - name: Download W7SDK
        if: steps.cache-w7sdk.outputs.cache-hit != 'true'
        run: aria2c -x 16 -s 16 -k 1M https://github.com/i486/W7SDK/releases/download/W7SDK-v1/W7SDK-v1.zip

      - name: Install W7SDK
        shell: powershell
        run: |
          $hash = (Get-FileHash W7SDK-v1.zip -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne "8d90703130c4bc735fa215ee14cddf868e27c156b72065c434ec747d5f120d44") {
            Write-Error "W7SDK hash mismatch: $hash"
            exit 1
          }
          7z x W7SDK-v1.zip -oW7SDK -y
          Copy-Item "W7SDK\Program Files\*" "C:\Program Files\" -Recurse -Force
          Copy-Item "W7SDK\Program Files (x86)\*" "C:\Program Files (x86)\" -Recurse -Force
          Copy-Item "W7SDK\vcredist\x64\*" "C:\Windows\System32\" -Force
          Copy-Item "W7SDK\vcredist\x86\*" "C:\Windows\SysWOW64\" -Force
          reg import "W7SDK\Registry\W7SDK.reg"

          $gacutil = "C:\Program Files\Microsoft SDKs\Windows\v7.1\Bin\NETFX 4.0 Tools\x64\gacutil.exe"
          @(
            "C:\Program Files (x86)\MSBuild\Microsoft.Cpp\v4.0\Microsoft.Build.CPPTasks.Common.dll",
            "C:\Program Files (x86)\MSBuild\Microsoft.Cpp\v4.0\Platforms\Win32\Microsoft.Build.CPPTasks.Win32.dll",
            "C:\Program Files (x86)\MSBuild\Microsoft.Cpp\v4.0\Platforms\x64\Microsoft.Build.CPPTasks.x64.dll"
          ) | ForEach-Object { & $gacutil /i $_ }

      # --- Boost 1.60.0 ---

      - name: Cache Boost 1.60.0
        uses: actions/cache@v4
        id: cache-boost
        with:
          path: C:\boost_1_60_0
          key: boost-1.60.0-msvc10-x64-v1

      - name: Install Boost 1.60.0
        if: steps.cache-boost.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Write-Host "Downloading Boost 1.60.0 source for headers..."
          # SourceForge NSIS installer is unreliable in CI (redirects break downloads).
          # Download source archive from archives.boost.io for headers,
          # and build the two libs we need (system + thread) with the v100 compiler.
          aria2c -x 16 -s 16 -k 1M -o boost_src.7z "https://archives.boost.io/release/1.60.0/source/boost_1_60_0.7z"
          7z x boost_src.7z -oC:\ -y
          Rename-Item "C:\boost_1_60_0" "C:\boost_1_60_0_src"

          Write-Host "Building Boost.System and Boost.Thread for MSVC 10.0 x64..."
          Push-Location "C:\boost_1_60_0_src"
          & cmd /c "call `"C:\Program Files\Microsoft SDKs\Windows\v7.1\Bin\SetEnv.cmd`" /x64 /Release 2>nul && bootstrap.bat"
          & cmd /c "call `"C:\Program Files\Microsoft SDKs\Windows\v7.1\Bin\SetEnv.cmd`" /x64 /Release 2>nul && b2 toolset=msvc-10.0 address-model=64 variant=release link=static threading=multi --with-system --with-thread --with-date_time --with-chrono --with-atomic --stagedir=stage/lib -j4"
          Pop-Location

          # Set up the expected directory structure
          New-Item -ItemType Directory -Force -Path "C:\boost_1_60_0"
          # Headers
          Copy-Item "C:\boost_1_60_0_src\boost" "C:\boost_1_60_0\boost" -Recurse
          # Libs
          New-Item -ItemType Directory -Force -Path "C:\boost_1_60_0\stage\lib"
          Copy-Item "C:\boost_1_60_0_src\stage\lib\lib\*" "C:\boost_1_60_0\stage\lib\" -Force
          Write-Host "Boost ready at C:\boost_1_60_0"

      # --- KenshiLib.lib (prebuilt from release) ---

      - name: Cache KenshiLib.lib
        uses: actions/cache@v4
        id: cache-kenshilib
        with:
          path: Libraries/KenshiLib.lib
          key: kenshilib-v0.2.1

      - name: Download KenshiLib.lib
        if: steps.cache-kenshilib.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          gh release download v0.2.1 --repo KenshiReclaimer/KenshiLib --pattern "*.zip" --dir _klib_tmp
          Expand-Archive -Path "_klib_tmp\KenshiLib_v0.2.1.zip" -DestinationPath _klib_tmp\extracted
          New-Item -ItemType Directory -Force -Path "Libraries"
          Copy-Item "_klib_tmp\extracted\KenshiLib.lib" "Libraries\KenshiLib.lib"
          Remove-Item -Recurse _klib_tmp
        env:
          GH_TOKEN: ${{ github.token }}

      # --- Build ---

      - name: Build KenshiPerfMod (Release x64)
        shell: cmd
        env:
          BOOST_INCLUDE_PATH: C:\boost_1_60_0
        run: |
          :: Set up VC++ 2010 and Windows 7.1 SDK environment then invoke VS2022 MSBuild
          :: SetEnv.cmd sets up ALL the right paths for the v100 compiler
          call "C:\Program Files\Microsoft SDKs\Windows\v7.1\Bin\SetEnv.cmd" /x64 /Release 2>nul
          :: Restore VCTargetsPath that SetEnv.cmd clobbers (VS2022 MSBuild needs this)
          set "VCTargetsPath=C:\Program Files (x86)\MSBuild\Microsoft.Cpp\v4.0\"
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" KenshiPerfMod.vcxproj /p:Configuration=Release /p:Platform=x64 /m /v:normal

      # --- Package ---

      - name: Package mod
        shell: powershell
        run: |
          $outDir = "KenshiPerfMod-release"
          New-Item -ItemType Directory -Force -Path $outDir

          # Find the built DLL
          $dll = Get-ChildItem -Recurse -Filter "KenshiPerfMod.dll" | Select-Object -First 1
          if (-not $dll) { Write-Error "DLL not found"; exit 1 }

          Copy-Item $dll.FullName "$outDir\KenshiPerfMod.dll"
          Copy-Item "KenshiPerfMod\mod-package\RE_Kenshi.json" "$outDir\"
          Copy-Item "KenshiPerfMod\mod-package\KenshiPerfMod.json" "$outDir\"
          Copy-Item "KenshiPerfMod\mod-package\KenshiPerfMod.mod" "$outDir\"

          Write-Host "Package contents:"
          Get-ChildItem $outDir

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KenshiPerfMod
          path: KenshiPerfMod-release/
          retention-days: 30
